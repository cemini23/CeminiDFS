paths:
  artifacts_dir: artifacts
  cache_dir: artifacts/cache
seasons:
  - 2024
  - 2025
rolling_windows:
  - 3
  - 5
  - 8
projection_mode: diy
simulate:
  enabled: false
  method: team_shock
  n_iterations: 5000
sim_rerank:
  enabled: false
  candidates: 2000
  final_count: 150
  quantile: 0.85
  ownership_penalty: 0.15
defense:
  alpha: 0.08
dst:
  league_sacks_per_game: 2.4
volume:
  league_sec_per_play: 36.2
  league_total: 44.8
  plays_intercept: 62.0
  base_pass_rate: 0.565
  sack_rate: 0.06
  scramble_rate: 0.08
usage:
  share_weights: [0.5, 0.3, 0.2]
  l3_window: 3
  qb_carry_share: 0.12
  min_l3_qb_pass_attempts: 10
  min_last_week_qb_pass_attempts: 18
  min_backup_start_qb_pass_attempts: 12
  min_two_week_qb_pass_attempts: 25
  qb_backup_pass_share: 0.05
  qb_implied_pass_boost: 0.020
  qb_implied_pass_baseline: 20.0
  min_backup_qb_season_attempts: 15
  min_backup_qb_l3_attempts: 5
  rb_committee_size: 3
  rb_carry_priors: [0.35, 0.12, 0.04]
  rb_target_priors: [0.08, 0.05, 0.03]
regression:
  max_overall_mae: 4.85
  max_qb_mae: 6.75
  max_rb_mae: 5.45
ownership:
  enabled: false
  calibration_path: null
buzz_signal:
  enabled: false
  lookback_hours: 24
  limit: 25
  ownership_boost_per_1k: 0.5
  max_ownership_boost: 8.0
luck_metrics:
  pyth_exponent: 2.37
stats:
  shrinkage:
    ypa: 250
    ypc: 250
    catch_rate: 80
    adot: 40
    td_target: 80
    # QB starters skew above league priors; lighter shrinkage retains their edge
    # (was a single hardcoded k=90 for ypa/td/int). Lower k => less pull to prior.
    qb_ypa: 55
    qb_td_rate: 55
    qb_int_rate: 90
    qb_rush: 140
    # RB starters skew above league priors; lighter shrinkage than generic ypc=250
    # helps retain observed efficiency and reduces under-bias in rush projections.
    rb_ypc: 120
    rb_td_per_carry: 120
  priors:
    # Anchors for QB shrinkage. League per-attempt averages include backups and
    # garbage time, biasing starters low; nudge anchors toward the starter pool.
    qb_ypa: 7.25
    qb_td_rate: 0.052
    # RB anchors: starter YPC and TD/carry rates skew above league averages
    # which include goal-line vultures and backup touches.
    rb_ypc: 4.5
    rb_td_per_carry: 0.035
coherence_risk:
  enabled: true
  pass_protection:
    enabled: true
    stress_threshold: 1.15
    max_penalty: 0.06
    qb_yds_penalty: 0.25
    recv_yds_penalty: 0.18
    # Pass-protection penalty is one-directional (only ever trims QB pass yards),
    # so it adds net negative bias across the QB pool. Scale it back < 1.0.
    qb_yds_penalty_scale: 0.5
  red_zone_playcall:
    enabled: true
    run_tendency_threshold: 1.10
    rb_carry_boost: 0.04
    te_target_boost: 0.05
    wr_target_trim: 0.03
  fourth_down:
    enabled: false
    aggression_threshold: 1.15
    pass_attempt_boost: 0.03
    target_boost: 0.02
  workload:
    enabled: false
    rolling_weeks: 3
    z_threshold: 1.0
    high_risk_cv_multiplier: 1.15
  sim_variance:
    enabled: true
    high_risk_cv_multiplier: 1.25
    stress_flag_threshold: 1.12
