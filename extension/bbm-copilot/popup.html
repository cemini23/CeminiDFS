<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 280px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 16px 0;
      color: #00d4ff;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      background: #0f0f1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      font-size: 13px;
    }
    input:focus {
      outline: none;
      border-color: #00d4ff;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover {
      background: #00b8e6;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
      display: none;
    }
    .status.success {
      display: block;
      background: rgba(0, 212, 255, 0.15);
      color: #00d4ff;
    }
    .status.error {
      display: block;
      background: rgba(255, 80, 80, 0.15);
      color: #ff6b6b;
    }
    .note {
      margin-top: 12px;
      font-size: 11px;
      color: #666;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>CeminiDFS BBM Copilot</h1>

  <div class="field">
    <label>API Base URL</label>
    <input type="text" id="apiBase" value="http://127.0.0.1:8765" placeholder="http://127.0.0.1:8765">
  </div>

  <div class="field">
    <label>Draft ID</label>
    <input type="text" id="draftId" placeholder="your-draft-id">
  </div>

  <div class="field">
    <label>API token (optional)</label>
    <input type="text" id="token" placeholder="leave blank if serve has no --token">
  </div>

  <button id="save">Save Settings</button>
  <button id="test" type="button" style="margin-top:8px;background:#333;color:#fff;">Test &amp; fetch draft ID</button>
  <div class="status" id="status">Saved!</div>

  <div class="note">
    1. Run <code>ceminidfs bbm serve --slot N</code> (leave terminal open).<br>
    2. Click <strong>Test &amp; fetch draft ID</strong> — auto-fills from server.<br>
    3. Open Underdog draft in Chrome — panel appears top-right.<br>
    <code>http://127.0.0.1:8765</code> in browser should show JSON status (not an error).
  </div>

  <script src="popup.js"></script>
</body>
</html>
